<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>tradingAndroid 下载中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:32px 20px;text-align:center}
header h1{font-size:24px;margin-bottom:4px}
header p{font-size:13px;opacity:.85}
.container{max-width:800px;margin:0 auto;padding:20px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:7px 18px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:.2s}
.filter-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.filter-btn.active-release{background:#22c55e;color:#fff;border-color:#22c55e}
.filter-btn.active-test{background:#f59e0b;color:#fff;border-color:#f59e0b}
.card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card .header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.card .version{font-size:17px;font-weight:700}
.card .meta{font-size:13px;color:#888;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;display:inline-block}
.badge-release{background:#dcfce7;color:#16a34a}
.badge-test{background:#fef3c7;color:#d97706}
.badge-android{background:#e0e7ff;color:#4f46e5}
.badge-ios{background:#f3e8ff;color:#9333ea}
.card .btns{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.btns a{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;transition:.2s;text-align:center;display:inline-block}
.btn-local{background:#22c55e;color:#fff}
.btn-local:hover{background:#16a34a}
.size{font-size:13px;color:#aaa;white-space:nowrap}
.loading,.empty,.offline{text-align:center;padding:60px 20px;color:#999;font-size:15px}
.empty,.offline{display:none}
.status-bar{text-align:center;padding:8px;font-size:13px;transition:.3s}
.status-bar.online{color:#16a34a}
.status-bar.offline{color:#dc2626}
</style>
</head>
<body>
<header>
<h1>tradingAndroid 下载中心</h1>
<p class="status-bar" id="statusBar">检测服务器状态...</p>
</header>
<div class="container">
<div class="filters">
<button class="filter-btn active" data-f="plat" data-v="all">全部平台</button>
<button class="filter-btn" data-f="plat" data-v="android">Android</button>
<button class="filter-btn" data-f="plat" data-v="ios">iOS</button>
<div style="flex:1"></div>
<button class="filter-btn active" data-f="env" data-v="all">全部版本</button>
<button class="filter-btn" data-f="env" data-v="release">正式版</button>
<button class="filter-btn" data-f="env" data-v="test">测试版</button>
</div>
<div id="list"></div>
<div class="loading" id="loading">加载中...</div>
<div class="empty" id="empty">暂无匹配的版本</div>
<div class="offline" id="offline">服务器未开机，数据暂不可用</div>
</div>
<script>
var serverIP = null;
var allReleases = [];
var platFilter = 'all';
var envFilter = 'all';

function formatSize(b){if(!b)return'';var m=b/1048576;return m>=1?m.toFixed(1)+' MB':(b/1024).toFixed(0)+' KB'}
function ne(env){if(env==='prod'||env==='release')return'release';if(env==='sit'||env==='test')return'test';return env}

function render(){
  var f=allReleases.filter(function(r){if(platFilter!=='all'&&r.platform!==platFilter)return false;if(envFilter!=='all'&&ne(r.env)!==envFilter)return false;return true});
  var el=document.getElementById('list'),em=document.getElementById('empty');
  if(f.length===0){el.innerHTML='';em.style.display='block';return}
  em.style.display='none';
  el.innerHTML=f.map(function(r){
    var e=ne(r.env),el2=e==='release'?'正式版':'测试版',eb=e==='release'?'badge-release':'badge-test';
    var pl=r.platform==='android'?'Android':'iOS',pb=r.platform==='android'?'badge-android':'badge-ios';
    var ic=r.platform==='android'?'\u{1F916}':'\u{1F34E}';
    return '<div class="card"><div class="header"><div class="version">'+ic+' v'+r.version+'</div><div class="meta"><span class="badge '+eb+'">'+el2+'</span><span class="badge '+pb+'">'+pl+'</span>'+(r.size?'<span class="size">'+formatSize(r.size)+'</span>':'')+'</div></div><div class="btns"><a class="btn-local" href="'+r.download_url+'" onclick="onDownload(this)">下载</a></div></div>'
  }).join('')
}

function detectServer(callback){
  var timeout=setTimeout(function(){fetchIPFromGithub(callback)},1500);
  var img=new Image();
  img.onload=function(){clearTimeout(timeout);serverIP='127.0.0.1';setStatus(true,'\u{1F7E2} 服务器在线（本机直连）');if(callback)callback()};
  img.onerror=function(){clearTimeout(timeout);fetchIPFromGithub(callback)};
  img.src='http://127.0.0.1:8080/ping?_t='+Date.now()
}

function fetchIPFromGithub(callback){
  fetch('./ip.json?_t='+Date.now()).then(function(r){if(!r.ok)throw new Error('获取失败');return r.json()}).then(function(data){
    if(data.ip){serverIP=data.ip;setStatus(true,'\u{1F7E2} 服务器在线（内网 '+serverIP+'）')}
    if(callback)callback()
  }).catch(function(){setStatus(false,'\u{1F534} 服务器离线');document.getElementById('loading').style.display='none';document.getElementById('offline').style.display='block'})
}

function setStatus(online,msg){
  var el=document.getElementById('statusBar');el.textContent=msg;el.className='status-bar '+(online?'online':'offline')
}

function onDownload(el){
  var txt=el.textContent;
  if(txt.indexOf('连接中')!==-1)return;
  el.textContent='\u23F3 连接中（首次需等待 30-60秒）...';
  setTimeout(function(){el.textContent=txt},2e3)
}

function loadReleases(){
  if(!serverIP){document.getElementById('loading').style.display='none';document.getElementById('offline').style.display='block';return}
  fetch('./releases.json?_t='+Date.now()).then(function(r){if(!r.ok)throw new Error('获取失败');return r.json()}).then(function(data){
    document.getElementById('loading').style.display='none';
    allReleases=data.map(function(f){
      return{version:f.version,env:f.env,platform:f.platform,size:f.size,filename:f.filename,download_url:'http://'+serverIP+':8080/download/'+f.platform+'/'+f.env+'/'+f.version+'/'+encodeURIComponent(f.filename)}
    });
    if(allReleases.length===0){document.getElementById('empty').style.display='block';document.getElementById('empty').textContent='\u{1F4E6} 暂无版本'}
    render()
  }).catch(function(){document.getElementById('loading').textContent='\u{26A0}\u{FE0F} 同步数据加载失败，请等待服务器同步'})
}

detectServer(function(){loadReleases()});

document.querySelectorAll('[data-f]').forEach(function(btn){
  btn.addEventListener('click',function(){
    var k=btn.dataset.f,v=btn.dataset.v;
    if(k==='plat'){platFilter=v;document.querySelectorAll('[data-f="plat"]').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')}
    else{envFilter=v;document.querySelectorAll('[data-f="env"]').forEach(function(b){b.classList.remove('active','active-release','active-test')});btn.classList.add('active');if(v==='release')btn.classList.add('active-release');if(v==='test')btn.classList.add('active-test')}
    render()
  })
})
</script>
</body>
</html>
