<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>tradingAndroid 下载中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:40px 20px;text-align:center}
header h1{font-size:28px;margin-bottom:6px}
header p{font-size:14px;opacity:.85}
.container{max-width:800px;margin:0 auto;padding:20px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:14px;transition:.2s}
.filter-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.filter-btn.active-env-prod{background:#22c55e;color:#fff;border-color:#22c55e}
.filter-btn.active-env-sit{background:#f59e0b;color:#fff;border-color:#f59e0b}
.card{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.card .info{flex:1;min-width:150px}
.card .version{font-size:18px;font-weight:700}
.card .meta{font-size:13px;color:#888;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;display:inline-block}
.badge-prod{background:#dcfce7;color:#16a34a}
.badge-sit{background:#fef3c7;color:#d97706}
.badge-android{background:#e0e7ff;color:#4f46e5}
.badge-ios{background:#f3e8ff;color:#9333ea}
.card .download{background:#667eea;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;white-space:nowrap;transition:.2s}
.card .download:hover{background:#5a6fd6}
.card .size{font-size:13px;color:#aaa;white-space:nowrap}
.loading,.empty{text-align:center;padding:60px 20px;color:#999;font-size:16px}
.empty{display:none}
</style>
</head>
<body>

<header>
  <h1>tradingAndroid 下载中心</h1>
  <p>选择对应版本下载安装包</p>
</header>

<div class="container">
  <div class="filters">
    <button class="filter-btn active" data-filter="platform" data-value="all">全部平台</button>
    <button class="filter-btn" data-filter="platform" data-value="android">Android</button>
    <button class="filter-btn" data-filter="platform" data-value="ios">iOS</button>

    <button class="filter-btn active" data-filter="env" data-value="all" style="margin-left:auto">全部环境</button>
    <button class="filter-btn" data-filter="env" data-value="prod">正式版</button>
    <button class="filter-btn" data-filter="env" data-value="sit">测试版</button>
  </div>

  <div id="releases"></div>
  <div class="loading" id="loading">加载中...</div>
  <div class="empty" id="empty">暂无匹配的版本</div>
</div>

<script>
const GITHUB_USER = 'xiaozaq123';
const GITHUB_REPO = 'trading-releases';
const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases`;

let allReleases = [];
let platformFilter = 'all';
let envFilter = 'all';

function parseTag(tag) {
  const m = tag.match(/^v?(\d[\d.]*\d+)-(prod|sit)-(android|ios)$/i);
  if (!m) return null;
  return { version: m[1], env: m[2].toLowerCase(), platform: m[3].toLowerCase() };
}

function formatSize(bytes) {
  if (!bytes) return '';
  const mb = bytes / 1024 / 1024;
  return mb >= 1 ? `${mb.toFixed(1)} MB` : `${(bytes/1024).toFixed(0)} KB`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function render() {
  const filtered = allReleases.filter(r => {
    const info = r._parsed;
    if (!info) return false;
    if (platformFilter !== 'all' && info.platform !== platformFilter) return false;
    if (envFilter !== 'all' && info.env !== envFilter) return false;
    return true;
  });

  const container = document.getElementById('releases');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = filtered.map(r => {
    const info = r._parsed;
    const asset = r.assets && r.assets[0];
    const envLabel = info.env === 'prod' ? '正式版' : '测试版';
    const envBadge = info.env === 'prod' ? 'badge-prod' : 'badge-sit';
    const platformLabel = info.platform === 'android' ? 'Android' : 'iOS';
    const platformBadge = info.platform === 'android' ? 'badge-android' : 'badge-ios';
    const platformIcon = info.platform === 'android' ? '🤖' : '🍎';

    return `
      <div class="card">
        <div class="info">
          <div class="version">${platformIcon} v${info.version}</div>
          <div class="meta">
            <span class="badge ${envBadge}">${envLabel}</span>
            <span class="badge ${platformBadge}">${platformLabel}</span>
            ${asset ? `<span class="size">${formatSize(asset.size)}</span>` : ''}
            <span class="size">${formatDate(r.published_at)}</span>
          </div>
        </div>
        ${asset ? `<a class="download" href="${asset.browser_download_url}" download>下载</a>` : ''}
      </div>
    `;
  }).join('');
}

function filter() {
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.filter;
      const val = btn.dataset.value;
      if (key === 'platform') {
        platformFilter = val;
        document.querySelectorAll('[data-filter="platform"]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      } else {
        envFilter = val;
        document.querySelectorAll('[data-filter="env"]').forEach(b => {
          b.classList.remove('active', 'active-env-prod', 'active-env-sit');
          if (b.dataset.value === 'prod') b.classList.remove('active-env-prod');
          if (b.dataset.value === 'sit') b.classList.remove('active-env-sit');
        });
        btn.classList.add('active');
        if (val === 'prod') btn.classList.add('active-env-prod');
        if (val === 'sit') btn.classList.add('active-env-sit');
      }
      render();
    });
  });
}

async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allReleases = data.filter(r => !r.draft).map(r => {
      r._parsed = parseTag(r.tag_name);
      return r;
    }).filter(r => r._parsed);
    document.getElementById('loading').style.display = 'none';
    render();
  } catch (e) {
    document.getElementById('loading').textContent = '加载失败，请稍后刷新重试';
  }
}

filter();
load();
</script>
</body>
</html>
