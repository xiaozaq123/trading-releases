<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>tradingAndroid 下载中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333}
#passwordScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)}
.pwd-box{background:#fff;padding:40px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center;width:360px;max-width:90vw}
.pwd-box h2{margin-bottom:8px;font-size:20px}
.pwd-box .sub{color:#666;margin-bottom:24px;font-size:14px}
.pwd-box input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;outline:none;transition:.2s}
.pwd-box input:focus{border-color:#667eea}
.pwd-box button{width:100%;margin-top:16px;padding:12px;background:#667eea;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:600}
.pwd-box button:hover{background:#5a6fd6}
.pwd-error{color:#e53e3e;margin-top:12px;font-size:14px;display:none}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:32px 20px;text-align:center}
header h1{font-size:26px;margin-bottom:4px}
header p{font-size:14px;opacity:.85}
.container{max-width:800px;margin:0 auto;padding:20px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:2px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:14px;transition:.2s}
.filter-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.filter-btn.active-prod{background:#22c55e;color:#fff;border-color:#22c55e}
.filter-btn.active-sit{background:#f59e0b;color:#fff;border-color:#f59e0b}
.card{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.card .info{flex:1;min-width:150px}
.card .version{font-size:18px;font-weight:700}
.card .meta{font-size:13px;color:#888;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600;display:inline-block}
.badge-prod{background:#dcfce7;color:#16a34a}
.badge-sit{background:#fef3c7;color:#d97706}
.badge-android{background:#e0e7ff;color:#4f46e5}
.badge-ios{background:#f3e8ff;color:#9333ea}
.card .download-btn{background:#667eea;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap;transition:.2s}
.card .download-btn:hover{background:#5a6fd6}
.card .size{font-size:13px;color:#aaa;white-space:nowrap}
.loading,.empty{text-align:center;padding:60px 20px;color:#999;font-size:16px}
.empty{display:none}
</style>
</head>
<body>

<div id="passwordScreen">
<div class="pwd-box">
<h2>tradingAndroid 下载中心</h2>
<p class="sub">请输入访问密码</p>
<input type="password" id="pwdInput" placeholder="访问密码">
<button onclick="checkPassword()">确认</button>
<div class="pwd-error" id="pwdError">密码错误</div>
</div>
</div>

<div id="mainContent" style="display:none">
<header><h1>tradingAndroid 下载中心</h1><p>选择对应版本下载安装包</p></header>
<div class="container">
<div class="filters">
<button class="filter-btn active" data-f="platform" data-v="all">全部平台</button>
<button class="filter-btn" data-f="platform" data-v="android">Android</button>
<button class="filter-btn" data-f="platform" data-v="ios">iOS</button>
<div style="flex:1"></div>
<button class="filter-btn active" data-f="env" data-v="all">全部版本</button>
<button class="filter-btn" data-f="env" data-v="prod">正式版</button>
<button class="filter-btn" data-f="env" data-v="sit">测试版</button>
</div>
<div id="releases"></div>
<div class="loading" id="loading">加载中...</div>
<div class="empty" id="empty">暂无匹配的版本</div>
</div>
</div>

<script>
let releases=[],pf='all',ef='all',pwd='';
function sz(n){if(!n)return'';const m=n/1048576;return m>=1?m.toFixed(1)+' MB':(n/1024).toFixed(0)+' KB'}
function dt(s){if(!s)return'';const d=new Date(s);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function render(){const f=releases.filter(r=>{if(pf!=='all'&&r.platform!==pf)return false;if(ef!=='all'&&r.env!==ef)return false;return true})
const el=document.getElementById('releases'),em=document.getElementById('empty')
if(f.length===0){el.innerHTML='';em.style.display='block';return}
em.style.display='none'
el.innerHTML=f.map(r=>{const el=r.env==='prod'?'正式版':'测试版',eb=r.env==='prod'?'badge-prod':'badge-sit'
const pl=r.platform==='android'?'Android':'iOS',pb=r.platform==='android'?'badge-android':'badge-ios'
const ic=r.platform==='android'?'🤖':'🍎'
return'<div class="card"><div class="info"><div class="version">'+ic+' v'+r.version+'</div><div class="meta"><span class="badge '+eb+'">'+el+'</span><span class="badge '+pb+'">'+pl+'</span>'+(r.size?'<span class="size">'+sz(r.size)+'</span>':'')+'<span class="size">'+dt(r.published_at)+'</span></div></div><button class="download-btn" onclick="dl(\''+r.tag+'\')">下载</button></div>'
}).join('')}
function dl(t){window.open('/api/download?password='+encodeURIComponent(pwd)+'&tag='+encodeURIComponent(t),'_blank')}
document.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{const k=b.dataset.f,v=b.dataset.v
if(k==='platform'){pf=v;document.querySelectorAll('[data-f="platform"]').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
else{ef=v;document.querySelectorAll('[data-f="env"]').forEach(x=>x.classList.remove('active','active-prod','active-sit'));b.classList.add('active');if(v==='prod')b.classList.add('active-prod');if(v==='sit')b.classList.add('active-sit')}
render()}))
async function cp(){const p=document.getElementById('pwdInput').value
const r=await fetch('/api/releases?password='+encodeURIComponent(p))
if(!r.ok){document.getElementById('pwdError').style.display='block';return}
document.getElementById('pwdError').style.display='none';pwd=p
document.getElementById('passwordScreen').style.display='none'
document.getElementById('mainContent').style.display='block';document.getElementById('loading').style.display='block'
try{releases=await r.json();document.getElementById('loading').style.display='none';render()}
catch{document.getElementById('loading').textContent='加载失败'}}
document.getElementById('pwdInput').addEventListener('keydown',function(e){if(e.key==='Enter')cp()})
</script>
</body>
</html>
