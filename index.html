<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>tradingAndroid 下载中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:420px;width:100%;color:#333}
.card h1{font-size:22px;margin-bottom:8px}
.card p{font-size:14px;color:#666;margin-bottom:24px;line-height:1.6}
.btn{display:block;width:100%;padding:16px;background:#22c55e;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:.2s;box-shadow:0 4px 12px rgba(34,197,94,.3)}
.btn:hover{background:#16a34a}
.btn:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}
.hint{font-size:12px;color:#999;margin-top:16px}
</style>
</head>
<body>
<div class="card">
<h1>tradingAndroid 下载中心</h1>
<p id="statusText">检测服务器状态...</p>
<a class="btn" id="downloadBtn" href="#" disabled style="pointer-events:none">获取地址中...</a>
<div class="hint" id="hintText"></div>
</div>
<script>
function setBtn(ip){
  document.getElementById('statusText').textContent = '点击下方按钮进入内网下载页面';
  var btn = document.getElementById('downloadBtn');
  btn.href = 'http://' + ip + ':8080/download-page';
  btn.textContent = '\u26A1 进入下载页面';
  btn.style.pointerEvents = 'auto';
  btn.removeAttribute('disabled');
  document.getElementById('hintText').textContent = '如果无法访问，说明服务器未开机';
}
function showOffline(){
  document.getElementById('statusText').textContent = '服务器未开机，请联系管理员';
  var btn = document.getElementById('downloadBtn');
  btn.textContent = '暂时无法使用';
  btn.style.background = '#ccc';
  document.getElementById('hintText').textContent = '等管理员开机后再来';
}
// 先尝试本地回环（管理员本机秒开）
var pingTimeout = setTimeout(function(){ fallbackToIpJson(); }, 1000);
var pingImg = new Image();
pingImg.onload = function(){ clearTimeout(pingTimeout); setBtn('127.0.0.1'); };
pingImg.onerror = function(){ clearTimeout(pingTimeout); fallbackToIpJson(); };
pingImg.src = 'http://127.0.0.1:8080/ping?_t=' + Date.now();

function fallbackToIpJson(){
  fetch('./ip.json?_t=' + Date.now()).then(function(r){
    if(!r.ok)throw new Error('获取失败');
    return r.json();
  }).then(function(data){
    if(!data.ip)throw new Error('IP为空');
    setBtn(data.ip);
  }).catch(showOffline);
}
</script>
</body>
</html>
